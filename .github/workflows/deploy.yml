# ── Job 2: Deploy ─────────────────────────────────────────
  deploy:
    name: Deploy to Azure VM
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VM
        env:
          VPS_HOST:    ${{ secrets.VPS_HOST }}
          VPS_USER:    ${{ secrets.VPS_USERNAME }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh $VPS_USER@$VPS_HOST << 'ENDSSH'
            set -e

            echo "── 1. Actualizando código ──"
            echo "Ruta de despliegue: $DEPLOY_PATH"
            
            # Crear la carpeta si no existe
            sudo mkdir -p $DEPLOY_PATH
            sudo chown -R $USER:$USER $DEPLOY_PATH
            
            cd $DEPLOY_PATH

            # Verificar si es un repo, si no, clonarlo
            if [ ! -d ".git" ]; then
              echo "Configurando repositorio por primera vez..."
              git clone https://github.com/Alejo21210/martinez-shopapi.git .
            fi

            git fetch origin
            git reset --hard origin/main

            echo "── 2. Instalando dependencias ──"
            uv sync --frozen

            echo "── 3. Aplicando migraciones ──"
            uv run python manage.py migrate --noinput

            echo "── 4. Recolectando estáticos ──"
            uv run python manage.py collectstatic --noinput --clear

            echo "── 5. Reiniciando servicios ──"
            # Nota: Asegúrate de que estos nombres coincidan con tus archivos .service
            sudo systemctl restart gunicorn-shopapi || sudo systemctl restart shopapi
            sudo systemctl restart nginx

            echo "── 6. Verificando salud de la API ──"
            sleep 3
            curl -sf http://127.0.0.1/api/health/ && echo "API OK" || echo "API ERROR (pero el despliegue terminó)"

            echo "Despliegue completado exitosamente"
          ENDSSH